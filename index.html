<!DOCTYPE html>
<html>
<head>
  <title>Citizenship AI Coach</title>
</head>
<body>
  <h2>Australian Citizenship AI Coach</h2>
<p style="font-size:12px;">
This tool is for educational purposes only and is not affiliated with the Australian Government.
</p>
  <input id="input" placeholder="Ask something..." style="width:300px; height:30px;" />
  <button onclick="send()">Send</button>

  <pre id="output"></pre>

  <script>
  async function send() {
    const message = document.getElementById("input").value;

    try {
      const res = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      console.log("Response status:", res.status);
      console.log("Response data:", data);

      document.getElementById("output").innerText =
        data.reply || data.error || JSON.stringify(data, null, 2);
    } catch (err) {
      console.error("Fetch error:", err);
      document.getElementById("output").innerText = "Fetch error: " + err.message;
    }
  }
</script>
</body>
</html>
